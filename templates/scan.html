<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance Analytics</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{background:#f0f2f5;font-family:Poppins,sans-serif;}
.card{border-radius:12px;box-shadow:0 8px 25px rgba(0,0,0,0.1);margin-top:20px;padding:20px;}
</style>
</head>
<body>
<div class="container mt-4">
<h2>Attendance Analytics</h2>
<div class="card">
<canvas id="chart"></canvas>
</div>
<a href="{{ url_for('faculty_dashboard') }}" class="btn btn-secondary">⬅ Back</a>
</div>
<p>Data: {{ data }}</p>

<script>
let names = [{% for d in data %}"{{ d.name }}",{% endfor %}];
let percentages = [{% for d in data %}{{ d.percentage }},{% endfor %}];

new Chart(document.getElementById("chart"), {
type:'bar',
data:{labels:names,datasets:[{label:'Attendance %',data:percentages,backgroundColor:'rgba(54,162,235,0.7)'}]},
options:{scales:{y:{beginAtZero:true,max:100}}}
});
</script>
</body>
</html>
