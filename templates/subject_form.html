<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Attendance Session</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f0f2f5;
font-family:Poppins,sans-serif;
}

.card{
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.1);
margin-top:60px;
padding:25px;
}

h3{
text-align:center;
margin-bottom:20px;
}

.btn{
border-radius:12px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

</style>

</head>

<body>

<div id="subject" class="section">
<div class="card">
<h4>Add Subject</h4>

<form action="/add_subject" method="POST">

<input name="subject" class="form-control mb-2" placeholder="Subject Name" required>

<select name="year" class="form-control mb-2" required>
<option value="">Select Year</option>
<option value="1">1st Year</option>
<option value="2">2nd Year</option>
<option value="3">3rd Year</option>
</select>

<select name="semester" class="form-control mb-2" required>
<option value="">Select Semester</option>
<option value="1">Sem 1</option>
<option value="2">Sem 2</option>
<option value="3">Sem 3</option>
<option value="4">Sem 4</option>
<option value="5">Sem 5</option>
<option value="6">Sem 6</option>
</select>

<h5 class="mt-3">Assign Faculty to Divisions</h5>

<label>Division A</label>
<select name="faculty_A" class="form-control mb-2">
<option value="">Select Faculty</option>
{% for f in faculty %}
<option value="{{ f.id }}">{{ f.name }}</option>
{% endfor %}
</select>

<label>Division B</label>
<select name="faculty_B" class="form-control mb-2">
<option value="">Select Faculty</option>
{% for f in faculty %}
<option value="{{ f.id }}">{{ f.name }}</option>
{% endfor %}
</select>

<label>Division C</label>
<select name="faculty_C" class="form-control mb-2">
<option value="">Select Faculty</option>
{% for f in faculty %}
<option value="{{ f.id }}">{{ f.name }}</option>
{% endfor %}
</select>

{% for s in subjects %}

<p>
{{ s.subject }} |
Year {{ s.year }} |
Sem {{ s.semester }} |
Div {{ s.division }} |
Faculty : {{ s.faculty.name }}
</p>

{% endfor %}

<button class="btn btn-primary mt-2">Add Subject</button>

</form>
</div>

<script>

function loadSubjects(){

let sem = document.getElementById("semester").value;
let subjectDropdown = document.getElementById("subject");

//subjectDropdown.innerHTML = '<option value="">Select Subject</option>';
<select name="subject">
    {% for sub in subjects %}
        <option value="{{ sub.id }}">{{ sub.subject }}</option>
    {% endfor %}
</select>
let subjects = {

1:["Programming in C","Mathematics","Digital Electronics","Communication Skills"],

2:["Data Structures","Computer Organization","Operating System","Statistics"],

3:["DBMS","Java Programming","Software Engineering","Computer Networks"],

4:["Python Programming","Web Technology","Data Communication","Operating Systems II"],

5:["Machine Learning","Cloud Computing","Mobile Application","Cyber Security"],

6:["Artificial Intelligence","Big Data","Project Work","Internship"]

};

if(subjects[sem]){

subjects[sem].forEach(function(sub){

let option = document.createElement("option");
option.value = sub;
option.text = sub;

subjectDropdown.appendChild(option);

});

}

}

</script>

</body>
</html>
