<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BCA Attendance System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:15px;
    background: linear-gradient(-45deg,#4f46e5,#06b6d4,#9333ea,#2563eb);
    background-size:400% 400%;
    animation:gradientBG 12s ease infinite;
    font-family:'Poppins',sans-serif;
}

@keyframes gradientBG{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Container */
.container-box{
    width:100%;
    max-width:850px;
    display:flex;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

/* Left panel */
.left-panel{
    flex:1;
    background:linear-gradient(135deg,#4f46e5,#06b6d4);
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:30px;
    text-align:center;
}

.left-panel img{
    width:100px;
    margin-bottom:15px;
}

.left-panel h2{
    font-weight:700;
    font-size:24px;
}

.left-panel p{
    font-size:14px;
    opacity:0.9;
}

/* Right panel */
.right-panel{
    flex:1;
    padding:30px;
}

.right-panel h3{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

.form-control{
    border-radius:8px;
    padding:10px;
}

.form-control:focus{
    box-shadow:0 0 8px #06b6d4;
    border-color:#06b6d4;
}

.login-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#06b6d4;
    color:white;
    font-weight:600;
}

.login-btn:hover{
    background:#0891b2;
}

/* Loader */
.loader{
display:none;
margin:auto;
margin-top:10px;
border:4px solid #f3f3f3;
border-top:4px solid #06b6d4;
border-radius:50%;
width:25px;
height:25px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.footer{
text-align:center;
margin-top:15px;
font-size:13px;
color:#6b7280;
}

/* 📱 Mobile Responsive */
@media (max-width:768px){

.container-box{
flex-direction:column;
}

.left-panel{
padding:25px 15px;
}

.left-panel img{
width:80px;
}

.left-panel h2{
font-size:20px;
}

.right-panel{
padding:25px 20px;
}

}

</style>

<script>
function showLoader(){
document.getElementById("loader").style.display="block";
}
</script>

</head>

<body>

<div class="container-box">

<!-- Left Panel -->

<div class="left-panel">
<img src="{{ url_for('static', filename='logo.png') }}">
<h2>BCA Attendance</h2>
<p> Smart Attendance System </p>
</div>

<!-- Right Panel -->

<div class="right-panel">

<h3>Login</h3>

{% if error %}
<div class="text-danger text-center">{{ error }}</div>
{% endif %}

<form method="POST" onsubmit="showLoader()">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" required>
</div>

<button type="submit" class="login-btn">Login</button>

<div id="loader" class="loader"></div>

</form>

<div class="footer">
BCA Smart Attendance System
</div>

</div>
</div>

</body>
</html>
