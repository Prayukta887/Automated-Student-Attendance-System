<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #e0f7fa, #f0f2f5);
}

/* Sidebar */
.sidebar {
    position: fixed;
    left: 0; top: 0;
    height: 100%;
    width: 250px;
    background: #1e293b;
    color: #f8fafc;
    padding-top: 20px;
    transition: 0.3s;
}
.sidebar.collapsed { width: 70px; }

.sidebar a {
    display: flex;
    align-items: center;
    color: #cbd5e1;
    padding: 12px 20px;
    text-decoration: none;
    border-radius: 8px;
    margin: 4px 10px;
}
.sidebar a:hover {
    background: #334155;
    color: #fff;
}

.toggle-btn {
    position: absolute;
    top: 20px;
    right: -25px;
    background: #4F46E5;
    color: white;
    border-radius: 50%;
    padding: 10px;
    cursor: pointer;
}

/* Main */
.main-content {
    margin-left: 250px;
    padding: 30px;
}
.main-content.collapsed { margin-left: 70px; }

/* Card */
.card {
    border-radius: 16px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    padding: 20px;
}

/* Blink */
.blink {
    animation: blink-animation 1s steps(5, start) infinite;
    color: red !important;
    font-weight: bold;
}
@keyframes blink-animation { to { visibility: hidden; } }

#reader { width: 300px; margin: auto; }
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4 class="text-center">Student Panel</h4>

    <div class="toggle-btn" onclick="toggleSidebar()">
        <i class="bi bi-list"></i>
    </div>

    <a href="/student/dashboard">
        <i class="bi bi-qr-code me-2"></i> Scan QR
    </a>

    <a href="{{ url_for('student_attendance') }}"
       class="{% if is_defaulter %}blink{% endif %}">
        <i class="bi bi-clipboard-check me-2"></i> My Attendance
    </a>

    <a href="/logout" class="text-danger">
        <i class="bi bi-box-arrow-right me-2"></i> Logout
    </a>
</div>

<!-- Main -->
<div class="main-content" id="main">
    <h2 class="mb-4">Student Dashboard</h2>

    <!-- Warnings -->
    {% if warnings %}
    <div class="alert alert-danger">
        <h5>⚠ Attendance Warning</h5>
        <ul>
            {% for w in warnings %}
            <li>{{ w.subject }} - {{ w.percentage }}%</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}

    <!-- QR Scanner -->
    <div class="card">
        <h5 class="text-center">Scan QR Code</h5>
        <div id="reader"></div>
    </div>
</div>

<script>
// QR Scanner
let scanned = false;

function onScanSuccess(decodedText) {
    if (scanned) return;
    scanned = true;

    let code = decodedText.includes("/scan/")
        ? decodedText.split("/scan/")[1]
        : decodedText;

    fetch("/mark_attendance", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ session_code: code })
    })
    .then(res => res.text())
    .then(data => {
        alert(data);
        window.location.href = "/student/attendance";
    });
}

function startScanner() {
    let scanner = new Html5Qrcode("reader");
    scanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: 250 },
        onScanSuccess
    );
}

window.onload = startScanner;

// Sidebar toggle
function toggleSidebar() {
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("collapsed");
}
</script>

</body>
</html>
