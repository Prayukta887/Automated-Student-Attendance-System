<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty QR Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { font-family: Poppins, sans-serif; }
        #sidebar { position: fixed; top:0; left:0; width:220px; height:100%; background:#0208142a; color:white; padding-top:20px; }
        #sidebar h4 { text-align:center; margin-bottom:30px; }
        #sidebar a { display:flex; align-items:center; padding:12px 20px; color:white; text-decoration:none; transition:0.3s; }
        #sidebar a i { margin-right:10px; font-size:18px; }
        #sidebar a:hover { background: rgba(255,255,255,0.2); }
        .content { margin-left: 220px; padding:30px; }
        form select, form button { width: 300px; }
        form button { margin-top: 10px; }
        .counter { font-size:28px; font-weight:bold; color:#2563eb; margin-top:20px; }
    </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
    <h4>Faculty Panel</h4>
    <a href="/faculty/dashboard"><i class="bi bi-house-door"></i> Dashboard</a>
    <a href="{{ url_for('generate_qr') }}"><i class="bi bi-qr-code"></i> Generate QR</a>
    <a href="/logout"><i class="bi bi-box-arrow-right"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="content">
    <h2 class="mt-4">Generate Attendance QR</h2>

    <!-- QR Generation Form -->
    <form action="{{ url_for('generate_qr') }}" method="POST">
        <label>Year:</label>
        <select name="year" class="form-control mb-2" required>
            <option value="">Select Year</option>
            <option>1</option><option>2</option><option>3</option>
        </select>

        <label>Semester:</label>
        <select name="semester" class="form-control mb-2" required>
            <option value="">Select Semester</option>
            <option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option>
        </select>

        <label>Division:</label>
        <select name="division" class="form-control mb-2" required>
            <option value="">Select Division</option>
            <option>A</option><option>B</option><option>C</option>
        </select>

        <label>Subject:</label>
        <select name="subject" class="form-control mb-2" required>
            {% for s in subjects %}
                <option value="{{ s.id }}">{{ s.subject }}</option>  <!-- ✅ value is now subject ID -->
            {% endfor %}
        </select>

        <button type="submit" class="btn btn-primary">Generate QR</button>
    </form>

    <!-- QR Display (only after POST) -->
    {% if qr %}
        <hr>
        <h3>QR for {{ subject }}</h3>
        <p>Expires at: {{ expiry.strftime("%d-%m-%Y %I:%M %p") }}</p>
        <img src="/{{ qr }}" width="300">
        <div class="counter">
            Students Present: <span id="count">0</span>
        </div>
        <a href="{{ url_for('faculty_dashboard') }}" class="btn btn-secondary mt-3">Back</a>
    {% endif %}
</div>

<script>
    {% if qr %}
    document.addEventListener("DOMContentLoaded", function() {
        function updateCount() {
            fetch("/attendance_count/{{ session_id }}")
            .then(res => res.json())
            .then(data => {
                document.getElementById("count").innerText = data.count;
            })
            .catch(err => console.error(err));
        }
        updateCount();  // fetch immediately on page load
        setInterval(updateCount, 2000); // update every 2 seconds
    });
    {% endif %}
</script>

</body>
</html>
