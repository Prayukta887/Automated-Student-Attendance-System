<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
/* ================= Body & Fonts ================= */
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(to right, #e0f7fa, #f0f2f5);
    transition: background 0.3s;
}
h2, h3, h4 { color: #212529; }

/* ================= Sidebar ================= */
.sidebar {
    position: fixed;
    left: 0; top: 0;
    height: 100%;
    width: 250px;
    background: #1e293b;
    padding-top: 20px;
    transition: 0.3s;
}
.sidebar.collapsed { width: 70px; }
.sidebar h4 {
    color: #f8fafc;
    text-align: center;
    margin-bottom: 30px;
    transition: 0.3s;
    white-space: nowrap; overflow: hidden;
}
.sidebar.collapsed h4 { opacity: 0; }
.sidebar a {
    display: flex; align-items: center;
    color: #cbd5e1; padding: 12px 20px;
    text-decoration: none; transition: 0.3s;
    white-space: nowrap; overflow: hidden;
    border-radius: 8px;
    margin: 4px 10px;
}
.sidebar.collapsed a { justify-content: center; padding: 12px 0; }
.sidebar a:hover {
    background: #334155;
    color: #fff;
    transform: translateX(3px);
}
.toggle-btn {
    position: absolute; top: 20px; right: -25px;
    width: 50px; height: 50px;
    background: #4F46E5;
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    transition: 0.3s;
}
.toggle-btn:hover { background: #06B6D4; transform: scale(1.1); }

/* ================= Main Content ================= */
.main {
    margin-left: 250px;
    padding: 30px;
    transition: 0.3s;
}
.main.collapsed { margin-left: 70px; }

/* ================= Cards ================= */
.card {
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    padding: 25px;
    margin-bottom: 25px;
    background: #ffffffcc;
    transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover {
    transform: translateY(-5px);
    box-shadow: 0 16px 40px rgba(0,0,0,0.15);
}

/* ================= Forms & Buttons ================= */
form select, form input, form button {
    width: 300px;
    margin-bottom: 10px;
}
.btn { border-radius: 8px; transition: 0.3s; }
.btn:hover { transform: scale(1.05); }

/* ================= Sections ================= */
.section { display: none; }
.section.active { display: block; }

/* ================= Responsive ================= */
@media(max-width:768px){
    .sidebar { width: 70px; }
    .main { margin-left: 80px; padding: 20px; }
}
</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <h4>Faculty Panel</h4>
    <div class="toggle-btn" onclick="toggleSidebar()"><i class="bi bi-list"></i></div>
    <a href="#" onclick="showSection('home')"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
    <a href="#" onclick="showSection('qr_section')"><i class="bi bi-qr-code me-2"></i> Generate QR</a>
    <a href="/faculty/analytics"><i class="bi bi-bar-chart-line me-2"></i> Analytics</a>
    <a href="/logout" class="text-danger"><i class="bi bi-box-arrow-right me-2"></i> Logout</a>
</div>

<!-- Main Content -->
<div class="main" id="main">
    <h2 class="mb-4">Faculty Dashboard</h2>

    <!-- Dashboard Home -->
    <div id="home" class="section active">
        <div class="card text-center">
            <h3>📊 Welcome back, {{ current_user.username }}!</h3>
            <p class="lead mt-2">
                Use the sidebar to generate QR codes or view analytics.
            </p>
        </div>
    </div>

    <!-- QR Generation Section -->
    <div id="qr_section" class="section">
        <div class="card">
            <h4>🔳 Generate Attendance QR</h4>
            <form action="{{ url_for('generate_qr') }}" method="POST">
                <select name="year" class="form-control" required>
                    <option value="">Select Year</option>
                    <option>1</option><option>2</option><option>3</option>
                </select>

                <select name="semester" class="form-control" required>
                    <option value="">Select Semester</option>
                    <option>1</option><option>2</option><option>3</option>
                    <option>4</option><option>5</option><option>6</option>
                </select>

                <select name="division" class="form-control" required>
                    <option value="">Select Division</option>
                    <option>A</option><option>B</option><option>C</option>
                </select>

                <select name="subject" class="form-control" required>
                    <option value="">Select Subject</option>
                    {% for s in subjects %}
                        <option value="{{ s.id }}">{{ s.subject }}</option>
                    {% endfor %}
                </select>

                <button type="submit" class="btn btn-primary">Generate QR</button>
            </form>

            {% if qr %}
            <div class="qr-display text-center mt-4">
                <h4>QR for {{ subject }}</h4>
                <img src="/{{ qr }}" width="300" alt="Attendance QR">
                <p>Expires at: {{ expiry }}</p>
            </div>
            {% endif %}
        </div>
    </div>

</div>

<script>
function showSection(id){
    document.querySelectorAll(".section").forEach(sec => sec.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}
function toggleSidebar(){
    document.getElementById("sidebar").classList.toggle("collapsed");
    document.getElementById("main").classList.toggle("collapsed");
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
